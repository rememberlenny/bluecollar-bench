name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Regenerate tasks
        run: make generate
      - name: Validate tasks
        run: python3 scripts/validate_tasks.py
